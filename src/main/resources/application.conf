maintenance-service {
  postgres {
    url = "jdbc:postgresql://localhost:5432/tracker_devices"
    url = ${?MAINTENANCE_DB_URL}
    user = "tracker"
    user = ${?MAINTENANCE_DB_USER}
    password = "tracker_password"
    password = ${?MAINTENANCE_DB_PASSWORD}
    max-pool-size = 10
  }

  redis {
    host = "localhost"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
  }

  kafka {
    bootstrap-servers = "localhost:9092"
    bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}
    consumer-group = "maintenance-service-mileage"
    gps-topic = "gps-events"
    maintenance-events-topic = "maintenance-events"
  }

  scheduler {
    calendar-reminders-cron = "0 5 0 * * ?"
    overdue-check-cron = "0 0 * * * ?"
    daily-mileage-cron = "0 55 23 * * ?"
    cleanup-cron = "0 0 3 1 * ?"
  }

  reminder-thresholds {
    first-km = 500
    second-km = 100
    first-days = 7
    second-days = 1
  }

  server {
    port = 8087
    port = ${?MAINTENANCE_PORT}
  }
}
